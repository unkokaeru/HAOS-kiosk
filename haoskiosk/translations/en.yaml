configuration:
  ha_username:
    name: "HA Username"
    description: "Home Assistant login username [required]"
  ha_password:
    name: "HA Password"
    description: "Home Assistant login password [required]"
  ha_url:
    name: "HA URL"
    description: |
      Base URL for HA [Default: http://localhost:8123]
      Note: Typically should not need to be changed since browser runs on the 'localhost' server
  ha_dashboard:
    name: "HA Dashboard"
    description: 'Dashboard path (following "HA URL") [Default: ""]'
  login_delay:
    name: "Login Delay"
    description: |
      Time to wait for login page to load in seconds [Default: 3.0]
      Note: Can often be set to '0'
  hdmi_port:
    name: "HDMI Port"
    description: |
      0 for HDMI1, 1 for HDMI2 [Default: 0]
      Note: Does not work on default RPi HAOS since HDMI2 mirrors HDMI1
  screen_timeout:
    name: "Screen Timeout"
    description: "Time in seconds until screen blanks; 0 for never [Default: 600]"
  browser_refresh:
    name: "Browser Refresh"
    description: |
      Browser refresh interval in seconds; 0 for never [Default: 600]
      Note: Recommended since on RPi, console messages can overwrite browser
  zoom_level:
    name: "Zoom Level"
    description: "Zoom factor 100 = 100% [Default: 100]"
  screen_brightness:
    name: "Screen Brightness"
    description: |
      Software brightness level from 0 to 100 [Default: 100]
      Note: Uses xrandr software brightness — 100 is full brightness, 0 is black
