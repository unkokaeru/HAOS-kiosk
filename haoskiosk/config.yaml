name: "HAOS Kiosk Display"
description: >
  Start X server and browser on local HAOS server and display dashboards in kiosk mode
version: "1.3.0"
slug: "haoskiosk"

arch:
  - aarch64
  - amd64

startup: application
host_network: true
host_dbus: true
init: false

devices:
  - /dev/fb0
  - /dev/fb1
  - /dev/dri/card0
  - /dev/dri/card1
  - /dev/dri/renderD128
  - /dev/input/event0
  - /dev/input/event1
  - /dev/input/event2
  - /dev/input/event3
  - /dev/input/event4
  - /dev/input/event5
  - /dev/input/event6
  - /dev/input/event7
  - /dev/input/event8
  - /dev/input/event9

privileged:
  - SYS_ADMIN

apparmor: false

options:
  ha_url: "http://localhost:8123"
  ha_dashboard: ""
  login_delay: 3.0
  hdmi_port: 0
  screen_timeout: 600
  browser_refresh: 600
  zoom_level: 100
  screen_brightness: 100

schema:
  ha_username: str
  ha_password: password
  ha_url: str
  ha_dashboard: str
  login_delay: float(0,)
  hdmi_port: int(0,1)
  screen_timeout: int(0,)
  browser_refresh: int(0,)
  zoom_level: int(0,)
  screen_brightness: int(0,100)

environment:
  DISPLAY: ":0"
